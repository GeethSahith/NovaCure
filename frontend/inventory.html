<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NovaCure | Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 2rem; }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: #3b82f6; border-bottom: 2px solid #1e293b; padding-bottom: 0.5rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.25rem; }
        input, select { width: 100%; padding: 0.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 4px; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; padding: 0.75rem 1rem; font-weight: 600; cursor: pointer; border-radius: 6px; width: 100%; margin-top: 1rem;}
        button:hover { background: #2563eb; }
        .nav { margin-bottom: 2rem; }
        .nav a { color: #94a3b8; text-decoration: none; margin-right: 1rem; font-weight: 600; padding: 0.5rem; background: #1e293b; border-radius: 4px;}
        .nav a:hover { color: #fff; }
        .log-box { background: #020617; padding: 1rem; border-radius: 8px; font-family: monospace; color: #10b981; margin-top: 1rem; height: 150px; overflow-y: auto;}
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <a href="dashboard.html">← Back to Dashboard</a>
    </div>
    
    <h1>Inventory Management 📦</h1>
    <p style="color: #94a3b8;">Add official items to the company catalog, then receive physical truck shipments of stock into your branch.</p>
    
    <div class="grid">
        <!-- Add Product -->
        <div class="card">
            <h3>1. Define Master Product</h3>
            <form id="productForm">
                <div class="form-group">
                    <label>Product Name (e.g. Paracetamol 500mg)</label>
                    <input type="text" id="pName" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="pCat" required>
                </div>
                <div class="form-group">
                    <label>Is Controlled Substance?</label>
                    <select id="pControl">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                    </select>
                </div>
                <button type="submit">Add to Global Catalog</button>
            </form>
            <div id="pLog" class="log-box">Awaiting task...</div>
        </div>

        <!-- Add Stock -->
        <div class="card">
            <h3>2. Receive Physical Stock</h3>
            <form id="stockForm">
                <div class="form-group">
                    <label>Master Product Catalog</label>
                    <select id="sProdId" required>
                        <option value="">Loading products...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Branch Code (Your Store)</label>
                    <input type="text" id="sBranch" required readonly>
                </div>
                <div class="form-group">
                    <label>Batch Number</label>
                    <input type="text" id="sBatch" required placeholder="BATCH-00x">
                </div>
                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="date" id="sExpiry" required>
                </div>
                <div class="grid" style="gap: 1rem; display: flex;">
                    <div style="flex:1">
                        <label>Quantity Received</label>
                        <input type="number" id="sQty" required>
                    </div>
                    <div style="flex:1">
                        <label>Unit Cost ($)</label>
                        <input type="number" step="0.01" id="sCost" required>
                    </div>
                </div>
                <button type="submit" style="background:#10b981;">Confirm Receipt of Goods</button>
            </form>
            <div id="sLog" class="log-box">Awaiting task...</div>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://127.0.0.1:8000";
    const token = localStorage.getItem("access_token");
    let currentBranch = "";

    if (!token) window.location.href = "index.html";

    // Get Branch Code and Products
    fetch(`${API_URL}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(res => res.json())
        .then(data => {
            currentBranch = data.data.branch_code;
            document.getElementById('sBranch').value = currentBranch;
            fetchProducts();
        });

    async function fetchProducts() {
        const select = document.getElementById('sProdId');
        try {
            const res = await fetch(`${API_URL}/inventory/products`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (data.success) {
                select.innerHTML = '<option value="">Select a Product...</option>';
                data.data.products.forEach(p => {
                    select.innerHTML += `<option value="${p.id}">${p.name} (${p.category})</option>`;
                });
            }
        } catch(e) {
            select.innerHTML = '<option value="">Error loading</option>';
        }
    }

    // Create Product
    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const log = document.getElementById('pLog');
        log.innerHTML = "Processing...";
        
        const payload = {
            name: document.getElementById('pName').value,
            category: document.getElementById('pCat').value,
            is_controlled: document.getElementById('pControl').value === "true",
            reorder_threshold: 10
        };

        try {
            const res = await fetch(`${API_URL}/inventory/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            log.innerHTML = JSON.stringify(data, null, 2).replace(/\n/g, '<br/>');
        } catch (e) {
            log.innerHTML = "Error connecting to backend.";
        }
    });

    // Add Stock
    document.getElementById('stockForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const log = document.getElementById('sLog');
        log.innerHTML = "Processing...";
        
        const payload = {
            product_id: document.getElementById('sProdId').value,
            branch_code: document.getElementById('sBranch').value,
            batch_number: document.getElementById('sBatch').value,
            expiry_date: document.getElementById('sExpiry').value,
            quantity: parseInt(document.getElementById('sQty').value),
            unit_cost: parseFloat(document.getElementById('sCost').value)
        };

        try {
            const res = await fetch(`${API_URL}/inventory/stock`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            log.innerHTML = JSON.stringify(data, null, 2).replace(/\n/g, '<br/>');
        } catch (e) {
            log.innerHTML = "Error connecting to backend.";
        }
    });
</script>
</body>
</html>
