<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NovaCure | Point of Sale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 2rem; }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: #10b981; border-bottom: 2px solid #1e293b; padding-bottom: 0.5rem; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.25rem; }
        input, select { width: 100%; padding: 0.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 4px; box-sizing: border-box; }
        button.action { background: #3b82f6; color: white; border: none; padding: 0.75rem 1rem; font-weight: 600; cursor: pointer; border-radius: 6px; width: 100%; margin-top: 1rem;}
        button.checkout { background: #10b981; color: white; border: none; padding: 1rem; font-weight: 700; font-size: 1.1rem; cursor: pointer; border-radius: 6px; width: 100%; margin-top: 1.5rem;}
        .nav { margin-bottom: 2rem; }
        .nav a { color: #94a3b8; text-decoration: none; margin-right: 1rem; font-weight: 600; padding: 0.5rem; background: #1e293b; border-radius: 4px;}
        .log-box { background: #020617; padding: 1rem; border-radius: 8px; font-family: monospace; color: #ef4444; margin-top: 1rem; height: auto;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem;}
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <a href="dashboard.html">← Back to Dashboard</a>
    </div>
    
    <h1>Point of Sale (Checkout) 🛒</h1>
    <p style="color: #94a3b8;">Ring up customers securely. This strictly checks your branch's inventory in real-time and rejects sales if stock is insufficient.</p>
    
    <div class="grid">
        <!-- Cart Builder -->
        <div class="card">
            <h3>Add Item to Cart</h3>
            <form id="itemForm">
                <div class="form-group">
                    <label>Select Medicine from Branch Inventory</label>
                    <select id="cStockItem" required>
                        <option value="">Loading inventory shelves...</option>
                    </select>
                </div>
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Quantity to Sell</label>
                        <input type="number" id="cQty" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Unit Sale Price ($)</label>
                        <input type="number" step="0.01" id="cPrice" required>
                    </div>
                </div>
                <button type="submit" class="action">Add to Cart List ↓</button>
            </form>

            <h3 style="margin-top: 3rem; border-top: 1px solid #333; padding-top: 1rem;">Current Cart</h3>
            <table id="cartTable">
                <thead>
                    <tr>
                        <th>Product ID</th>
                        <th>Batch</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS fills this -->
                </tbody>
            </table>
        </div>

        <!-- Checkout Process -->
        <div class="card" style="align-self: start;">
            <h3>Checkout</h3>
            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="cName" placeholder="Walk-in">
            </div>
            <div class="form-group">
                <label>Payment Method</label>
                <select id="cMethod">
                    <option value="cash">Cash</option>
                    <option value="card">Card</option>
                    <option value="upi">UPI</option>
                </select>
            </div>
            
            <button class="checkout" onclick="processCheckout()">Confirm & Bill</button>
            <div id="terminalLog" class="log-box" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://127.0.0.1:8000";
    const token = localStorage.getItem("access_token");
    let currentBranch = "";
    let cartItems = [];

    if (!token) window.location.href = "index.html";

    // Auto-fetch branch security
    fetch(`${API_URL}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(res => res.json())
        .then(data => { 
            currentBranch = data.data.branch_code; 
            fetchInventory();
        });
        
    async function fetchInventory() {
        const select = document.getElementById('cStockItem');
        try {
            const res = await fetch(`${API_URL}/inventory/stock/${currentBranch}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (data.success) {
                select.innerHTML = '<option value="">Scan or Select Medicine...</option>';
                data.data.stock.forEach(item => {
                    // Store prod json in the value so we can extract id and batch
                    const val = JSON.stringify({id: item.product_id, batch: item.batch_number});
                    const displayName = item.products ? item.products.name : item.product_id.substring(0,8);
                    
                    select.innerHTML += `<option value='${val}'>${displayName} [Batch: ${item.batch_number}] — ${item.quantity} in stock</option>`;
                });
            }
        } catch(e) {
            select.innerHTML = '<option value="">Error loading</option>';
        }
    }

    // Handle Adding to Cart Array
    document.getElementById('itemForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const stockData = JSON.parse(document.getElementById('cStockItem').value);
        if (!stockData) return alert("Select a valid item first.");
        
        const item = {
            product_id: stockData.id,
            batch_number: stockData.batch,
            quantity: parseInt(document.getElementById('cQty').value),
            unit_price: parseFloat(document.getElementById('cPrice').value)
        };
        
        cartItems.push(item);
        renderCart();
        e.target.reset(); // clear form inputs
    });

    function renderCart() {
        const tbody = document.querySelector("#cartTable tbody");
        tbody.innerHTML = "";
        cartItems.forEach(item => {
            const subtotal = (item.quantity * item.unit_price).toFixed(2);
            tbody.innerHTML += `
                <tr>
                    <td><span title="${item.product_id}">${item.product_id.substring(0,8)}...</span></td>
                    <td>${item.batch_number}</td>
                    <td>${item.quantity}</td>
                    <td>$${item.unit_price}</td>
                    <td>$${subtotal}</td>
                </tr>
            `;
        });
    }

    async function processCheckout() {
        if (cartItems.length === 0) return alert("Cart is empty!");
        
        const log = document.getElementById('terminalLog');
        log.style.display = "block";
        log.innerHTML = "Validating stock via backend...";

        const payload = {
            branch_code: currentBranch,
            customer_name: document.getElementById('cName').value || "Walk-in",
            payment_method: document.getElementById('cMethod').value,
            items: cartItems
        };

        try {
            const res = await fetch(`${API_URL}/sales/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            if (res.ok && data.success) {
                log.style.color = "#10b981"; // success green
                log.innerHTML = "SALE APPROVED! Inventory deducted gracefully.<br><br>Receipt ID: " + data.data.id;
                cartItems = []; // clear cart
                renderCart();
            } else {
                // E.g. insufficient quantity error from our backend logic
                log.style.color = "#ef4444"; 
                log.innerHTML = "REJECTED:<br>" + (data.detail || JSON.stringify(data));
            }
        } catch (e) {
            log.innerHTML = "Server connectivity failure.";
        }
    }
</script>
</body>
</html>
